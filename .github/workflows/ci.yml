name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SLACK_SIGNING_SECRET: ci-test-signing-secret
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/testdb
  OPENAI_API_KEY: ci-openai-key
  API_AUTH_TOKEN: ci-api-token

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Lint source
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run lint
          else
            echo "No source files — skipping lint"
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Typecheck source
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run typecheck
          else
            echo "No source files — skipping typecheck"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: |
          if find . -name '*.test.ts' -not -path './node_modules/*' | grep -q .; then
            pnpm run test:coverage
          else
            echo "No test files — skipping tests"
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build project
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run build
            echo "=== Build output ==="
            du -sh dist/
            echo "=== File count ==="
            find dist/ -name '*.js' | wc -l
          else
            echo "No source files — skipping build"
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f "Dockerfile" ]; then
            docker build -t slack-sentiment:ci .
          else
            echo "No Dockerfile — skipping Docker build"
          fi

      - name: Verify image contents
        if: success()
        run: |
          if [ -f "Dockerfile" ]; then
            docker run --rm --entrypoint sh slack-sentiment:ci -c "test -f /app/dist/index.js"
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod || true

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
