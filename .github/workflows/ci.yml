name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Lint source
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run lint
          else
            echo "No source files — skipping lint"
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Typecheck source
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run typecheck
          else
            echo "No source files — skipping typecheck"
          fi

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Run tests
        run: |
          if find . -name '*.test.ts' -not -path './node_modules/*' | grep -q .; then
            pnpm run test:coverage
          else
            echo "No test files — skipping tests"
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build project
        run: |
          if [ -d "src" ] && find src -name '*.ts' | grep -q .; then
            pnpm run build
            echo "=== Build output ==="
            du -sh dist/
            echo "=== File count ==="
            find dist/ -name '*.js' | wc -l
          else
            echo "No source files — skipping build"
          fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: ${{ hashFiles('Dockerfile') != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t slack-sentiment:ci .

      - name: Verify image starts
        run: |
          docker run --rm -d --name smoke-test \
            -e SLACK_SIGNING_SECRET=test_secret \
            -e DATABASE_URL=postgresql://fake:fake@localhost:5432/fake \
            slack-sentiment:ci || true
          sleep 3
          docker logs smoke-test 2>&1 || true
          docker stop smoke-test || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod || true

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
