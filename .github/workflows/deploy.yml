name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t slack-sentiment:${{ github.sha }} .

      - name: Deploy placeholder
        run: echo "Deploy to ${{ inputs.environment }} — configure with your deployment target"
