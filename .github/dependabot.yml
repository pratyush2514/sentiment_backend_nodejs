version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      production-deps:
        patterns: ["*"]
        exclude-patterns: ["@types/*", "eslint*", "typescript*", "vitest*"]
      dev-deps:
        patterns: ["@types/*", "eslint*", "typescript*", "vitest*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
