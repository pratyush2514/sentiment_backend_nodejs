version: "3.8"

x-app-base: &app-base
  build: .
  env_file:
    - .env
  restart: unless-stopped

services:
  web:
    <<: *app-base
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: web
      RUN_MIGRATIONS_ON_BOOT: "false"
    ports:
      - "${PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    <<: *app-base
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: worker
      RUN_MIGRATIONS_ON_BOOT: "false"

  scheduler:
    <<: *app-base
    environment:
      NODE_ENV: production
      RUNTIME_ROLE: scheduler
      RUN_MIGRATIONS_ON_BOOT: "false"
